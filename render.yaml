# CreditLens AI — Render deployment (backend API).
# Render auto-detects this file. Set the `sync: false` secrets in the dashboard.
services:
  - type: web
    name: creditlens-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ENABLE_VECTOR_SEARCH
        value: "true"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false
      # Comma-separated allowed origins — set this to your Vercel URL after deploying the frontend
      - key: CREDITLENS_CORS_ORIGINS
        sync: false
